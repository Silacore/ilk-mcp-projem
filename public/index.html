<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aykan Yerel Ajan</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 14px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: #1a3a5c; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .header-info h1 { font-size: 15px; font-weight: 500; }
  .header-info p { font-size: 12px; color: #888; }
  .status { margin-left: auto; font-size: 11px; background: #0d2b0d; color: #4caf50; padding: 3px 10px; border-radius: 20px; }
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .msg.bot .msg-avatar { background: #1a3a5c; }
  .msg.user .msg-avatar { background: #2a1a3a; }
  .msg-body { background: #1a1a1a; border-radius: 4px 12px 12px 12px; padding: 10px 14px; font-size: 14px; line-height: 1.6; border: 1px solid #2a2a2a; }
  .msg.user .msg-body { background: #1a2a3a; border-radius: 12px 4px 12px 12px; border-color: #1e3a5c; }
  .tool-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #4caf50; background: #0d2b0d; padding: 2px 8px; border-radius: 20px; margin-bottom: 6px; }
  .suggestions { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 20px 10px; }
  .suggestion { font-size: 12px; padding: 5px 12px; border: 1px solid #333; border-radius: 20px; color: #aaa; cursor: pointer; background: transparent; transition: all 0.2s; }
  .suggestion:hover { border-color: #555; color: #ddd; background: #1a1a1a; }
  .input-area { padding: 12px 20px 16px; border-top: 1px solid #222; display: flex; gap: 10px; }
  #input { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px 14px; color: #e0e0e0; font-size: 14px; outline: none; resize: none; font-family: inherit; }
  #input:focus { border-color: #444; }
  #send { background: #1a3a5c; border: none; color: #7cb9e8; border-radius: 10px; padding: 10px 18px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  #send:hover { background: #1e4a7a; }
  #send:disabled { opacity: 0.4; cursor: not-allowed; }
  .typing { display: flex; gap: 4px; padding: 10px 14px; background: #1a1a1a; border-radius: 4px 12px 12px 12px; border: 1px solid #2a2a2a; width: fit-content; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: #555; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); background: #888; } }
</style>
</head>
<body>
<header>
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>Aykan Yerel Ajan</h1>
    <p id="tool-count">Tool'lar yükleniyor...</p>
  </div>
  <span class="status" id="status">çevrimiçi</span>
</header>

<div id="chat">
  <div class="msg bot">
    <div class="msg-avatar">🤖</div>
    <div class="msg-body">Merhaba! Ben Aykan'ın AI ajanıyım. Dosya oluşturabilir, web'de arama yapabilir, klasörleri listeleyebilirim. Ne yapmamı istersin?</div>
  </div>
</div>

<div class="suggestions">
  <button class="suggestion" onclick="send('Desktop klasörünü listele')">Desktop'u listele</button>
  <button class="suggestion" onclick="send('Türkiye yapay zeka 2025 haberlerini ara')">Haber ara</button>
  <button class="suggestion" onclick="send('Desktop/test klasörüne merhaba.txt oluştur, içine Merhaba Dünya yaz')">Dosya oluştur</button>
</div>

<div class="input-area">
  <textarea id="input" rows="1" placeholder="Bir görev ver..."></textarea>
  <button id="send" onclick="sendMessage()">Gönder</button>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let history = [];

  fetch('/api/tools').then(r => r.json()).then(tools => {
    document.getElementById('tool-count').textContent = tools.length + ' tool aktif: ' + tools.map(t => t.name).join(', ');
  }).catch(() => {
    document.getElementById('tool-count').textContent = 'tool bilgisi alınamadı';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function send(text) { input.value = text; sendMessage(); }

  function addMsg(role, content, toolsUsed) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
    let inner = '';
    if (role === 'bot' && toolsUsed && toolsUsed.length > 0) {
      inner += '<div>' + toolsUsed.map(t => `<span class="tool-badge">✓ ${t}</span>`).join(' ') + '</div>';
    }
    inner += content.replace(/\n/g, '<br>');
    div.innerHTML = `<div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div><div class="msg-body">${inner}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing';
    div.innerHTML = '<div class="msg-avatar">🤖</div><div class="typing"><span></span><span></span><span></span></div>';
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    sendBtn.disabled = true;
    addMsg('user', msg);
    history.push({ role: 'user', content: msg });
    addTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: history.slice(-10) })
      });
      const data = await res.json();
      document.getElementById('typing')?.remove();
      if (data.error) { addMsg('bot', 'Hata: ' + data.error); }
      else {
        addMsg('bot', data.reply, data.toolsUsed);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch(e) {
      document.getElementById('typing')?.remove();
      addMsg('bot', 'Bağlantı hatası: ' + e.message);
    }
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
